services:
  mongo:
    image: mongo:7
    container_name: rss-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rss-api
    env_file:
      - ./apps/api/.env.example
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - DB_NAME=rss_db
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  mongo_data:
