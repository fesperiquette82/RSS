name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --non-interactive

      - name: Force Kotlin 1.9.25 across generated Android files
        run: |
          echo "android.kotlinVersion=1.9.25" >> apps/mobile/android/gradle.properties
          rg -l "1\.9\.24" apps/mobile/android | xargs -r sed -i "s/1\.9\.24/1.9.25/g"

      - name: Build debug APK
        env:
          NODE_ENV: production
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rss-mobile-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
